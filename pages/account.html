<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Mariel Store</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../auth.css">
</head>
<body>

  <nav>
    <div class="wrap">
      <div class="logo">
        <img src="../images/logo.png" alt="Mariel Store Logo">
      </div>

      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="contact.html">Contact</a></li>

        <li id="auth-links" class="auth-links">
          <span id="register-link">
            <a id="register-nav-link" href="#">Register</a>
          </span>

          <span class="nav-separator">|</span>

          <span id="login-link">
            <a id="login-nav-link" href="#">Login</a>
          </span>
        </li>

        <li id="user-menu" class="user-menu hidden">
          <a href="#" id="user-name-btn" class="user-name-btn">Account</a>
          <ul class="user-dropdown">
            <li><a id="account-nav-link" href="#">My Account</a></li>
            <li><a href="#" id="logout-btn">Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </nav>

  <section class="page-header">
    <div class="wrap">
      <h1>My <em>Account</em></h1>
      <p>View your basic account details.</p>
    </div>
  </section>

  <section class="section-white">
    <div class="wrap">
      <div class="account-card">
        <h2>Profile <em>Details</em></h2>

        <div class="account-info">
          <div class="account-item">
            <div class="account-label">Username</div>
            <div class="account-value" id="account-username">-</div>
          </div>

          <div class="account-item">
            <div class="account-label">Full Name</div>
            <div class="account-value" id="account-full-name">-</div>
          </div>

          <div class="account-item">
            <div class="account-label">Email</div>
            <div class="account-value" id="account-email">-</div>
          </div>

          <div class="account-item">
            <div class="account-label">Phone Number</div>
            <div class="account-value" id="account-phone">-</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../script.js"></script>
</body>
</html>
